# cargo-deny configuration — 安全自治原则 §10

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = [
  # OpenSSL — 我们用 rustls
  { name = "openssl", reason = "Use rustls for cross-platform pure-Rust TLS" },
  { name = "openssl-sys" },
  # axios 思维毒草（笑）—— 此处无效但放着提醒前端别用 axios
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
