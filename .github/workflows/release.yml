name: Release

# 触发方式：
#   1. push 形如 v2.x.x 的 tag —— 自动创建 Release(draft)
#   2. workflow_dispatch + mode=dry-run —— 跑构建上传 artifact，不创建 Release
#   3. workflow_dispatch + mode=release —— 跑构建并创建 Release(draft)
#      mode=release 时需填 release_tag，例如 v2.0.0-alpha.1
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        type: choice
        required: true
        default: dry-run
        options:
          - dry-run
          - release
      release_tag:
        description: "Release tag（mode=release 必填，例 v2.0.0-alpha.1）"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            name: macos-arm64
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - runner: macos-13
            name: macos-x64
            target: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - runner: windows-latest
            name: windows-x64
            target: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── 发版模式：tauri-action 自动 build + 上传到 Release(draft) ──
      # 触发：push tag v* 或 workflow_dispatch + mode=release
      - name: Build Tauri app (release)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'release')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TERMINAL_PROMPT: 0
        with:
          tagName: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
          releaseName: "ClawHeart Desktop ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}"
          releaseBody: |
            ## ClawHeart Desktop ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}

            自动构建于 commit `${{ github.sha }}`

            ### 📦 下载

            - **macOS Apple Silicon (M1/M2/M3/M4)**：`ClawHeart_*_aarch64.dmg`
            - **macOS Intel**：`ClawHeart_*_x64.dmg`
            - **Windows 10/11 x64**：`ClawHeart_*_x64-setup.exe`

            发布前请人工 publish draft。
          releaseDraft: true
          prerelease: true
          args: --target ${{ matrix.target }}

      # ── 在 release 模式额外构建 clawheart-cli 单二进制并上传 ──
      - name: Build clawheart-cli (release)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'release')
        shell: bash
        run: |
          cargo build -p clawheart-cli --release --target ${{ matrix.target }}

      - name: Package + upload clawheart-cli (release)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'release')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          TARGET="${{ matrix.target }}"

          if [[ "$TARGET" == *windows* ]]; then
            EXT="zip"
            BIN_NAME="clawheart-cli.exe"
          else
            EXT="tar.gz"
            BIN_NAME="clawheart-cli"
          fi

          BIN_PATH="target/${TARGET}/release/${BIN_NAME}"
          [ -f "$BIN_PATH" ] || { echo "missing $BIN_PATH"; exit 1; }

          PKG_VERSIONED="clawheart-cli-${VERSION}-${TARGET}.${EXT}"
          PKG_STABLE="clawheart-cli-${TARGET}.${EXT}"

          if [ "$EXT" = "zip" ]; then
            (cd "$(dirname "$BIN_PATH")" && 7z a -tzip "/tmp/${PKG_VERSIONED}" "${BIN_NAME}" > /dev/null)
            cp "/tmp/${PKG_VERSIONED}" "/tmp/${PKG_STABLE}"
          else
            tar -czf "/tmp/${PKG_VERSIONED}" -C "$(dirname "$BIN_PATH")" "${BIN_NAME}"
            cp "/tmp/${PKG_VERSIONED}" "/tmp/${PKG_STABLE}"
          fi

          gh release upload "${TAG_NAME}" "/tmp/${PKG_VERSIONED}" "/tmp/${PKG_STABLE}" \
            -R ${{ github.repository }} --clobber

      # ── dry-run 模式：直接调 tauri build，不创建 Release ──
      - name: Build Tauri app (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifact (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: clawheart-${{ matrix.name }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: ignore
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # Linux CLI-only build —— 不跑 Desktop GUI bundle，仅供 Docker 镜像
  # （clawheartv2Web 用）与服务器端用户使用。webkit/gtk 依赖太重，
  # Desktop Linux 暂不发版。
  # ──────────────────────────────────────────────────────────────────
  build-cli-linux:
    name: Build CLI · ${{ matrix.name }}
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'release')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            name: linux-x64
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build clawheart-cli
        shell: bash
        run: |
          cargo build -p clawheart-cli --release --target ${{ matrix.target }}

      - name: Package + upload clawheart-cli
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          TARGET="${{ matrix.target }}"
          BIN_PATH="target/${TARGET}/release/clawheart-cli"
          [ -f "$BIN_PATH" ] || { echo "missing $BIN_PATH"; exit 1; }

          PKG_VERSIONED="clawheart-cli-${VERSION}-${TARGET}.tar.gz"
          PKG_STABLE="clawheart-cli-${TARGET}.tar.gz"

          tar -czf "/tmp/${PKG_VERSIONED}" -C "$(dirname "$BIN_PATH")" "clawheart-cli"
          cp "/tmp/${PKG_VERSIONED}" "/tmp/${PKG_STABLE}"

          gh release upload "${TAG_NAME}" "/tmp/${PKG_VERSIONED}" "/tmp/${PKG_STABLE}" \
            -R ${{ github.repository }} --clobber

  # ──────────────────────────────────────────────────────────────────
  # 给 Release 加上去版本号的稳定别名，便于官网用
  # `releases/latest/download/ClawHeart_<arch>.dmg` 永久链接
  # ──────────────────────────────────────────────────────────────────
  finalize-aliases:
    name: Finalize · stable aliases
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Mirror versioned assets to stable filenames
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/aliases

          rename_and_upload() {
            local pattern="$1"
            local stable="$2"
            local src
            src=$(gh release view "$TAG" -R "$REPO" --json assets -q ".assets[].name" \
                  | grep -E "$pattern" | head -1 || true)
            if [ -z "$src" ]; then
              echo "⚠ 未找到匹配 $pattern 的产物，跳过 $stable"
              return 0
            fi
            echo "→ $src ⇒ $stable"
            gh release download "$TAG" -R "$REPO" -p "$src" --output "/tmp/aliases/$stable"
            gh release upload "$TAG" "/tmp/aliases/$stable" -R "$REPO" --clobber
          }

          rename_and_upload "_aarch64\.dmg$"        "ClawHeart_aarch64.dmg"
          rename_and_upload "_x64\.dmg$"            "ClawHeart_x64.dmg"
          rename_and_upload "_x64-setup\.exe$"      "ClawHeart_x64-setup.exe"

          echo "✓ 稳定别名已就绪，draft Release 待人工 publish"
