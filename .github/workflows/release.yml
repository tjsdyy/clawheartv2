name: Release

# 触发：push 形如 v2.x.x 的 tag，或 Actions 页面手动触发（仅 dry-run）
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (跑构建但不创建 Release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            name: macos-arm64
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - runner: macos-13
            name: macos-x64
            target: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - runner: windows-latest
            name: windows-x64
            target: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 防止 Windows 上 git autocrlf 把行尾搞乱影响校验
          GIT_TERMINAL_PROMPT: 0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClawHeart Desktop ${{ github.ref_name }}"
          releaseBody: |
            ## ClawHeart Desktop ${{ github.ref_name }}

            自动构建于 commit `${{ github.sha }}`

            ### 📦 下载

            - **macOS Apple Silicon (M1/M2/M3/M4)**：`ClawHeart_*_aarch64.dmg`
            - **macOS Intel**：`ClawHeart_*_x64.dmg`
            - **Windows 10/11 x64**：`ClawHeart_*_x64-setup.exe` 或 `.msi`

            ### 校验

            发布前请人工 publish draft；安装包均经 GitHub Actions 工件签名（attestation）。
          releaseDraft: ${{ github.event_name == 'push' }}
          prerelease: true
          # dry-run（workflow_dispatch + dry_run=true）时不创建 release，仅 build 工件
          includeRelease: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
          args: --target ${{ matrix.target }}

      - name: Upload artifact (dry-run / 备份)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: clawheart-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: ignore
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────
  # 给 Release 加上去版本号的稳定别名，便于官网用
  # `releases/latest/download/ClawHeart_<arch>.dmg` 永久链接
  # ──────────────────────────────────────────────────────────────────
  finalize-aliases:
    name: Finalize · stable aliases
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Mirror versioned assets to stable filenames
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/aliases

          rename_and_upload() {
            local pattern="$1"   # 文件名 grep 模式
            local stable="$2"    # 别名
            local src
            src=$(gh release view "$TAG" -R "$REPO" --json assets -q ".assets[].name" \
                  | grep -E "$pattern" | head -1 || true)
            if [ -z "$src" ]; then
              echo "⚠ 未找到匹配 $pattern 的产物，跳过 $stable"
              return 0
            fi
            echo "→ $src ⇒ $stable"
            gh release download "$TAG" -R "$REPO" -p "$src" --output "/tmp/aliases/$stable"
            gh release upload "$TAG" "/tmp/aliases/$stable" -R "$REPO" --clobber
          }

          # macOS dmg
          rename_and_upload "_aarch64\.dmg$"        "ClawHeart_aarch64.dmg"
          rename_and_upload "_x64\.dmg$"            "ClawHeart_x64.dmg"
          # Windows installer (NSIS)
          rename_and_upload "_x64-setup\.exe$"      "ClawHeart_x64-setup.exe"
          # Windows MSI（如未来 bundle.targets 含 msi 时启用）
          rename_and_upload "_x64_en-US\.msi$"      "ClawHeart_x64.msi"

          echo "✓ 稳定别名已就绪，draft Release 待人工 publish"
