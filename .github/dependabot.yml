version: 2
updates:
  # Frontend (npm/pnpm via package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["deps", "frontend"]
    groups:
      tauri-frontend:
        patterns:
          - "@tauri-apps/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"

  # Rust
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["deps", "rust"]
    groups:
      tauri-rust:
        patterns:
          - "tauri"
          - "tauri-*"
      crypto:
        patterns:
          - "rustls"
          - "rcgen"
          - "ed25519-*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["deps", "ci"]
