<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA976"/>
      <stop offset="100%" stop-color="#04734F"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F8F1"/>
    </linearGradient>
    <filter id="shieldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="28" flood-color="#00261A" flood-opacity="0.35"/>
    </filter>
    <filter id="checkShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#04734F" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- macOS squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bgGrad)"/>

  <!-- 网格点阵肌理（极淡，呼应首页背景） -->
  <g opacity="0.10" fill="#FFFFFF">
    <circle cx="180" cy="180" r="6"/>
    <circle cx="320" cy="180" r="6"/>
    <circle cx="460" cy="180" r="6"/>
    <circle cx="600" cy="180" r="6"/>
    <circle cx="740" cy="180" r="6"/>
    <circle cx="880" cy="180" r="6"/>
    <circle cx="180" cy="320" r="6"/>
    <circle cx="320" cy="320" r="6"/>
    <circle cx="180" cy="840" r="6"/>
    <circle cx="320" cy="840" r="6"/>
    <circle cx="460" cy="840" r="6"/>
    <circle cx="600" cy="840" r="6"/>
    <circle cx="740" cy="840" r="6"/>
    <circle cx="880" cy="840" r="6"/>
    <circle cx="880" cy="320" r="6"/>
    <circle cx="880" cy="460" r="6"/>
    <circle cx="880" cy="600" r="6"/>
    <circle cx="880" cy="740" r="6"/>
    <circle cx="180" cy="460" r="6"/>
    <circle cx="180" cy="600" r="6"/>
    <circle cx="180" cy="740" r="6"/>
  </g>

  <!-- Shield - 居中放大版（基于 HomeHero 的 path d="M12 2 L3 6 L3 11 C3 17 7 21 12 22 C17 21 21 17 21 11 L21 6 Z"） -->
  <g transform="translate(512, 512) scale(38) translate(-12, -12)" filter="url(#shieldShadow)">
    <path
      d="M12 2 L3 6 L3 11 C3 17 7 21 12 22 C17 21 21 17 21 11 L21 6 Z"
      fill="url(#shieldGrad)"
      stroke="#FFFFFF"
      stroke-width="0.4"
    />
  </g>

  <!-- 对勾 ✓ -->
  <g transform="translate(512, 512) scale(38) translate(-12, -12)" filter="url(#checkShadow)">
    <path
      d="M8.5 12.4 L11 14.8 L15.6 9.6"
      fill="none"
      stroke="#0B7A56"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
